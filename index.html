<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes - Cooperativa Agropecuária</title>
    <style>
        /* Resetando alguns estilos padrão */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilos Globais */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f5f1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            flex-direction: column;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-size: cover;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 900px;
            text-align: center;
            border: 2px solid #4CAF50;
        }

        h1 {
            font-size: 32px;
            color: #4CAF50;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 20px;
            color: #4CAF50;
            margin-bottom: 15px;
        }

        .form-container {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input, select, button {
            padding: 12px;
            margin: 8px 0;
            width: 80%;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            width: 80%;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        .filters {
            margin-bottom: 30px;
        }

        .filters input, .filters select {
            width: 30%;
            display: inline-block;
            margin-right: 10px;
            padding: 12px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
        }

        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }

        td {
            background-color: #f9f9f9;
        }

        td button.delete {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
        }

        td button.delete:hover {
            background-color: #e53935;
        }

        footer {
            margin-top: 30px;
            color: #4CAF50;
            font-size: 14px;
        }

        /* Adicionando animações e efeitos */
        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        .filters input, .filters select {
            animation: bounce 0.5s ease-out;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Clientes - Cooperativa Agropecuária</h1>
        <h2>Cadastro de novos clientes e filtros de pesquisa</h2>

        <!-- Filtros de pesquisa -->
        <div class="filters">
            <input type="text" id="search" placeholder="Pesquisar por nome..." onkeyup="filterTable()">
            <select id="letterFilter" onchange="filterTable()">
                <option value="">Filtrar por número de letras</option>
                <option value="5">5 letras</option>
                <option value="6">6 letras</option>
                <option value="7">7 letras</option>
            </select>
            <select id="startLetterFilter" onchange="filterTable()">
                <option value="">Filtrar por letra inicial</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="M">M</option>
                <option value="R">R</option>
            </select>
            <select id="endLetterFilter" onchange="filterTable()">
                <option value="">Filtrar por letra final</option>
                <option value="A">A</option>
                <option value="E">E</option>
                <option value="O">O</option>
                <option value="S">S</option>
            </select>
        </div>

        <!-- Formulário para adicionar usuários -->
        <div class="form-container">
            <input type="text" id="userName" placeholder="Nome do Cliente" />
            <input type="email" id="userEmail" placeholder="E-mail do Cliente" />
            <button onclick="addUser()">Adicionar Cliente</button>
        </div>

        <!-- Tabela de usuários -->
        <table id="userTable">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Usuários serão listados aqui -->
            </tbody>
        </table>

        <footer>
            <p>&copy; 2026 Cooperativa Agropecuária - Todos os direitos reservados</p>
        </footer>
    </div>
