<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>
    <style>
        /* Resetando alguns estilos padrão */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            flex-direction: column;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 650px;
            text-align: center;
            margin-top: 30px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #2d2d2d;
        }

        .form-container {
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            margin: 8px 0;
            width: 80%;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 80%;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .filters {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filters input,
        .filters select {
            padding: 10px;
            width: 30%;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .filters select {
            background-color: #fafafa;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f4f4f4;
            font-weight: bold;
            color: #333;
        }

        td {
            font-size: 15px;
            color: #555;
        }

        button.delete {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        button.delete:hover {
            background-color: #e53935;
        }

        .empty-message {
            font-size: 16px;
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Usuários</h1>

        <!-- Filtros e barra de pesquisa -->
        <div class="filters">
            <input type="text" id="search" placeholder="Pesquisar por nome..." onkeyup="filterTable()">
            <select id="letterFilter" onchange="filterTable()">
                <option value="">Filtrar por número de letras</option>
                <option value="5">5 letras</option>
                <option value="6">6 letras</option>
                <option value="7">7 letras</option>
            </select>
        </div>

        <!-- Formulário para adicionar usuários -->
        <div class="form-container">
            <input type="text" id="userName" placeholder="Nome do Usuário" />
            <input type="email" id="userEmail" placeholder="E-mail do Usuário" />
            <button onclick="addUser()">Adicionar Usuário</button>
        </div>

        <!-- Tabela de usuários -->
        <table id="userTable">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Usuários serão listados aqui -->
            </tbody>
        </table>

        <p class="empty-message" id="emptyMessage">Nenhum usuário encontrado.</p>
    </div>

    <script>
        // Usuários iniciais aleatórios
        const initialUsers = [
            { name: "Ana", email: "ana@exemplo.com" },
            { name: "Carlos", email: "carlos@exemplo.com" },
            { name: "Beatriz", email: "beatriz@exemplo.com" },
            { name: "Felipe", email: "felipe@exemplo.com" },
            { name: "Giovana", email: "giovana@exemplo.com" },
            { name: "Ricardo", email: "ricardo@exemplo.com" },
            { name: "Mariana", email: "mariana@exemplo.com" },
            { name: "Julia", email: "julia@exemplo.com" },
            { name: "Pedro", email: "pedro@exemplo.com" },
            { name: "Renato", email: "renato@exemplo.com" }
        ];

        // Carregar os usuários iniciais na tabela
        window.onload = function() {
            initialUsers.forEach(user => addUserToTable(user.name, user.email));
        };

        // Função para adicionar usuário à tabela
        function addUser() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            if (name === "" || email === "") {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            addUserToTable(name, email);

            // Limpar campos após adicionar
            document.getElementById('userName').value = "";
            document.getElementById('userEmail').value = "";
        }

        // Função para adicionar o usuário à tabela
        function addUserToTable(name, email) {
            const table = document.getElementById('userTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();

            const cellName = row.insertCell(0);
            const cellEmail = row.insertCell(1);
            const cellActions = row.insertCell(2);

            cellName.textContent = name;
            cellEmail.textContent = email;

            const deleteButton = document.createElement("button");
            deleteButton.textContent = "Remover";
            deleteButton.classList.add("delete");
            deleteButton.onclick = function() {
                table.deleteRow(row.rowIndex - 1); // Remove a linha da tabela
                checkEmptyTable();
            };

            cellActions.appendChild(deleteButton);

            checkEmptyTable();
        }

        // Função para filtrar a tabela com base nos filtros
        function filterTable() {
            const searchQuery = document.getElementById('search').value.toLowerCase();
            const letterFilter = document.getElementById('letterFilter').value;
            const table = document.getElementById('userTable');
            const rows = table.getElementsByTagName('tbody')[0].getElementsByTagName('tr');

            let hasResults = false;
            for (let i = 0; i < rows.length; i++) {
                const nameCell = rows[i].cells[0];
                const name = nameCell.textContent || nameCell.innerText;
                const letterCount = name.length;

                const matchesSearch = name.toLowerCase().includes(searchQuery);
                const matchesLetterFilter = letterFilter ? letterCount === parseInt(letterFilter) : true;

                if (matchesSearch && matchesLetterFilter) {
                    rows[i].style.display = '';
                    hasResults = true;
                } else {
                    rows[i].style.display = 'none';
                }
            }

            if (!hasResults) {
                document.getElementById('emptyMessage').style.display = 'block';
