<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>
    <style>
        /* Resetando alguns estilos padrão */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .form-container {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80%;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 80%;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f4f4f4;
        }

        button.delete {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        button.delete:hover {
            background-color: #e53935;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Usuários</h1>

        <div class="form-container">
            <input type="text" id="userName" placeholder="Nome do Usuário" />
            <input type="email" id="userEmail" placeholder="E-mail do Usuário" />
            <button onclick="addUser()">Adicionar Usuário</button>
        </div>

        <table id="userTable">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Usuários serão listados aqui -->
            </tbody>
        </table>
    </div>

    <script>
        // Função para adicionar usuário
        function addUser() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            if (name === "" || email === "") {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            const table = document.getElementById('userTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();

            const cellName = row.insertCell(0);
            const cellEmail = row.insertCell(1);
            const cellActions = row.insertCell(2);

            cellName.textContent = name;
            cellEmail.textContent = email;

            const deleteButton = document.createElement("button");
            deleteButton.textContent = "Remover";
            deleteButton.classList.add("delete");
            deleteButton.onclick = function() {
                table.deleteRow(row.rowIndex - 1); // Remove a linha da tabela
            };

            cellActions.appendChild(deleteButton);

            // Limpar campos após adicionar
            document.getElementById('userName').value = "";
            document.getElementById('userEmail').value = "";
        }
    </script>
</body>
</html>
